<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>inicio de sesión</title>
    <link rel="stylesheet" href="log_in.css">
</head>
<body>
    
    <form >
        <h2>
            Inicio de Sesión
        </h2>

        <!-- INPUTS -->
        <div class="form_input">
            <label for="nombre">Nombre completo</label>

            <input class="caja_translúcida" type="text" placeholder="Nombre completo" id="nombre">
        </div>
        <div  class="form_input">
            <label for="email">Correo eléctronico</label>
                <input class="caja_translúcida" type="email" placeholder="Correo electrónico" id="email"> 
        </div>

        <!--- SELECCIÓN-->
        <div class="form_input">
            <label> Seleccione
                <select  name="type-of-expression" id="">
                    <option value="">llorar</option>
                    <option value="">gritar</option>
                    <option value="">rezar</option>
                </select>
            </label>
            
        </div>

        <!--- CAJA DE MENSAJERÍA-->
        <div class="form_input">
            <label for="mensaje">Comentarios</label>
                <textarea  maxlength="50" placeholder="Deja tu comentario sobre las mejoras implementadas" id="mensaje"></textarea> 
            <label for="check">Acepto términos y condiciones</label>
            <input type="checkbox" id="check">
        </div>
        
    </form>
        
</body>
</html>
